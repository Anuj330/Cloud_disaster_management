services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  api:
    build: .
    command: sh -c "python3 scripts/wait_for_db.py && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/code

  worker:
    build: .
    command: sh -c "python3 scripts/wait_for_db.py && celery -A app.core.celery_app.celery_app worker --loglevel=info"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/code

  beat:
    build: .
    command: sh -c "python3 scripts/wait_for_db.py && celery -A app.core.celery_app.celery_app beat --loglevel=info"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/code

  service_a:
    build: .
    command: uvicorn mock_service:app --host 0.0.0.0 --port 9001
    environment:
      MOCK_SERVICE_NAME: billing-api
      MOCK_SERVICE_REGION: region-a
      MOCK_SERVICE_PORT: 9001
    ports:
      - "9001:9001"

  service_b:
    build: .
    command: uvicorn mock_service:app --host 0.0.0.0 --port 9002
    environment:
      MOCK_SERVICE_NAME: billing-api
      MOCK_SERVICE_REGION: region-b
      MOCK_SERVICE_PORT: 9002
    ports:
      - "9002:9002"

  dashboard:
    image: node:20-alpine
    working_dir: /ui
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./dashboard:/ui
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
